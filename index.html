<script>

document.addEventListener("DOMContentLoaded", function() {

  /* NAV sticky */

  window.addEventListener("scroll", function(){
    document.getElementById("nav")
      .classList.toggle("stuck", window.scrollY > 50);
  });


  /* MENU MOBILE */

  const burger = document.getElementById("burger");
  const mobileMenu = document.getElementById("mobileMenu");
  const closeBtn = document.getElementById("menuClose");

  if(burger){
    burger.addEventListener("click", function(){
      burger.classList.toggle("open");
      mobileMenu.classList.toggle("open");
    });
  }

  if(closeBtn){
    closeBtn.addEventListener("click", function(){
      burger.classList.remove("open");
      mobileMenu.classList.remove("open");
    });
  }

  document.querySelectorAll(".nav-mobile a").forEach(link=>{
    link.addEventListener("click", ()=>{
      mobileMenu.classList.remove("open");
      burger.classList.remove("open");
    });
  });


  /* ANIMATION BARRES LANGUES */

  const bars = document.querySelectorAll(".lang-bar-fill");

  const obs = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const w = entry.target.getAttribute("data-w");
        entry.target.style.width = w + "%";
      }
    });
  },{threshold:.4});

  bars.forEach(b=>obs.observe(b));


  /* KPI COUNTERS */

  function animateValue(el,target,prefix="",suffix=""){
    let start=0;
    const duration=1400;

    const step = timestamp=>{
      if(!start) start=timestamp;

      const progress=Math.min((timestamp-start)/duration,1);
      const value=Math.floor(progress*target);

      el.textContent = prefix + value + suffix;

      if(progress<1){
        requestAnimationFrame(step);
      }
    };

    requestAnimationFrame(step);
  }

  const kpis = document.querySelectorAll(".kpi-n");

  const kpiObserver = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){

        const el = entry.target;
        const target = el.dataset.target;
        const prefix = el.dataset.prefix || "";
        const suffix = el.dataset.suffix || "";

        animateValue(el,target,prefix,suffix);

        kpiObserver.unobserve(el);
      }
    });
  },{threshold:.6});

  kpis.forEach(k=>kpiObserver.observe(k));

});

</script>
